<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My College Diary</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Dancing+Script:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>

    <!-- NAV -->
    <nav>

        <div class="nav-inner">
            <a href="index.html" class="nav-left">
                My College Diary
            </a>
            <div class="nav-right">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="diary.html">Diary</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html" class="active">
                    Contact
                </a>
            </div>
        </div>
    </nav>

    <!-- NAV  mobile-->
    <nav>
        <div class="nav-inner">
            <!-- LOGO -->
            <a href="index.html" class="nav-left">
                My College Diary
            </a>
            <!-- MOBILE MENU BUTTON -->
            <div class="menu-toggle" id="menuToggle">
                ☰
            </div>
            <!-- NAV LINKS -->
            <div class="nav-right" id="mobileMenu">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="diary.html">Diary</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>
    <!-- CONTACT -->
    <section class="contact-page">

        <!-- FLOATS -->
        <div class="float-contact contact-star">
            ✦
        </div>

        <div class="float-contact contact-swirl">
            ୨ৎ
        </div>

        <div class="float-contact contact-heart">
            .ೀ
        </div>

        <!-- HEADER -->
        <p class="contact-mini">
            let's connect
        </p>

        <h1 class="contact-title">
            Contact Me
        </h1>

        <p class="contact-sub">

            whether it's random thoughts,
            school stuff, collaborations,
            or just saying hi —
            my inbox is open ♡

        </p>

        <!-- FORM -->
        <form class="contact-form" action="https://formspree.io/f/xwvyqljw" method="POST">

            <input type="text" name="name" placeholder="your name" required>

            <input type="email" name="email" placeholder="your email" required>

            <textarea name="message" placeholder="write something sweet..." required></textarea>

            <button type="submit">
                send message ✦
            </button>

        </form>
        <!-- SOCIALS -->
        <div class="socials">

            <a href="https://www.facebook.com/mydazai" target="_blank" class="social-box">

                <i class="fa-brands fa-facebook-f"></i>

                Facebook

            </a>

            <a href="https://www.instagram.com/eajjou/" target="_blank" class="social-box">

                <i class="fa-brands fa-instagram"></i>

                Instagram

            </a>

            <a href="https://github.com/krig-dcoder" target="_blank" class="social-box">

                <i class="fa-brands fa-github"></i>

                GitHub

            </a>

            <a href="https://www.roblox.com/users/1608201965/profile" class="social-box">

                <i class="fa-solid fa-gamepad"></i>

                Roblox

            </a>

        </div>

    </section>
    <script>

        document.addEventListener("mousemove", (e) => {

            const sparkle = document.createElement("div");

            sparkle.className = "sparkle";

            sparkle.style.left = e.clientX + "px";
            sparkle.style.top = e.clientY + "px";

            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 800);

        });
    </script>
    <script>

        const menuToggle =
            document.getElementById("menuToggle");

        const mobileMenu =
            document.getElementById("mobileMenu");

        menuToggle.addEventListener("click", () => {

            mobileMenu.classList.toggle("show");

        });

    </script>
</body>

</html>
