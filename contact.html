<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact - My College Diary</title>

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

    <!-- GOOGLE FONTS -->

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Dancing+Script:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="contact-body">

    <!-- =========================================
         NAVBAR
    ========================================= -->

    <nav>

        <div class="nav-inner">

            <!-- LOGO -->

            <a href="index.html" class="nav-left">
                My College Diary
            </a>

            <!-- MOBILE BUTTON -->

            <div class="menu-toggle" id="menuToggle">
                ☰
            </div>

            <!-- NAV LINKS -->

            <div class="nav-right" id="mobileMenu">

                <a href="index.html">
                    Home
                </a>

                <a href="about.html">
                    About
                </a>

                <a href="diary.html">
                    Diary
                </a>

                <a href="gallery.html">
                    Gallery
                </a>

                <a href="contact.html" class="active">
                    Contact
                </a>

            </div>

        </div>

    </nav>

    <!-- =========================================
         CONTACT PAGE
    ========================================= -->

    <section class="contact-page">

        <!-- FLOATING DECORATIONS -->

        <div class="float-contact contact-star">
            ✦
        </div>

        <div class="float-contact contact-swirl">
            ୨ৎ
        </div>

        <div class="float-contact contact-heart">
            .ೀ
        </div>

        <!-- HEADER -->

        <p class="contact-mini">
            let's connect
        </p>

        <h1 class="contact-title">
            Contact Me
        </h1>
        <p class="contact-sub">
            hit me up for random thoughts, school stuff, collaborations, or if you wanna play roblox, valorant, or
            mobile legends sometime ✦
        </p>

        <!-- =========================================
             CONTACT FORM
        ========================================= -->

        <form class="contact-form" action="https://formspree.io/f/xwvyqljw" method="POST">

            <input type="text" name="name" placeholder="your name" required>

            <input type="email" name="email" placeholder="your email" required>

            <textarea name="message" placeholder="write something sweet..." required></textarea>

            <button type="submit">
                send message ✦
            </button>

        </form>

        <!-- =========================================
             SOCIALS
        ========================================= -->

        <div class="socials">

            <!-- FACEBOOK -->

            <a href="https://www.facebook.com/mydazai" target="_blank" class="social-box">

                <i class="fa-brands fa-facebook-f"></i>

                Facebook

            </a>

            <!-- INSTAGRAM -->

            <a href="https://www.instagram.com/eajjou/" target="_blank" class="social-box">

                <i class="fa-brands fa-instagram"></i>

                Instagram

            </a>

            <!-- GITHUB -->

            <a href="https://github.com/krig-dcoder" target="_blank" class="social-box">

                <i class="fa-brands fa-github"></i>

                GitHub

            </a>
            <!-- EMAIL -->

            <button class="social-box email-box" onclick="copyText('yourgmail@gmail.com')">

                <i class="fa-solid fa-envelope"></i>

                hanjineul.j@gmail.com

            </button>

            <!-- CONTACT -->

            <button class="social-box phone-box" onclick="copyText('09123456789')">

                <i class="fa-solid fa-phone"></i>

                0969 0969 808

            </button>
        </div>

    </section>

    <!-- =========================================
         BACK TO TOP
    ========================================= -->

    <button id="backToTop">
        ↑
    </button>

    <!-- =========================================
         SPARKLE EFFECT
    ========================================= -->

    <script>

        document.addEventListener("mousemove", (e) => {

            const sparkle =
                document.createElement("div");

            sparkle.className = "sparkle-effect";

            sparkle.style.left =
                e.clientX + "px";

            sparkle.style.top =
                e.clientY + "px";

            document.body.appendChild(sparkle);

            setTimeout(() => {

                sparkle.remove();

            }, 800);

        });

    </script>

    <!-- =========================================
         MOBILE MENU
    ========================================= -->

    <script>

        const menuToggle =
            document.getElementById("menuToggle");

        const mobileMenu =
            document.getElementById("mobileMenu");

        menuToggle.addEventListener("click", () => {

            mobileMenu.classList.toggle("show");

        });

    </script>

    <!-- =========================================
         BACK TO TOP SCRIPT
    ========================================= -->

    <script>

        const backToTop =
            document.getElementById("backToTop");

        window.addEventListener("scroll", () => {

            if (window.scrollY > 300) {

                backToTop.classList.add("show");

            } else {

                backToTop.classList.remove("show");
            }

        });

        backToTop.addEventListener("click", () => {

            window.scrollTo({

                top: 0,

                behavior: "smooth"

            });

        });

    </script>
    <script>

        function copyText(text) {

            navigator.clipboard.writeText(text);

            const note =
                document.createElement("div");

            note.className = "copy-popup";

            note.innerText = "copied ✦";

            document.body.appendChild(note);

            setTimeout(() => {

                note.remove();

            }, 1500);

        }

    </script>

    <!-- MAIN JS -->

    <script src="script.js"></script>

</body>

</html>
