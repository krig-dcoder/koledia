        rel="stylesheet">

<body>
    <!-- NAV -->
    <nav>

            <div class="nav-right">

    <!-- GALLERY -->

        <h1 class="gallery-title">

        <!-- ALBUMS -->

            <button class="tab">

            </button>

            <button class="tab">

            </button>

            <button class="tab">

            </button>

            <button class="tab">

            </button>

        <!-- GRID -->

            <!-- GROUP -->
            <div class="gallery-item group" onclick="openImage(this)">

            <div class="gallery-item duo" onclick="openImage(this)">

            <!-- SCHOOL -->
            <div class="gallery-item school" onclick="openImage(this)">

            </div>

            <!-- RANDOMS -->
            <div class="gallery-item random" onclick="openImage(this)">
                <img src="tfren4.jpg">

            </div>

                <img src="tfren5.jpg">

            <div class="gallery-item random" onclick="openImage(this)">
                <img src="tfren9.jpg">
                <div class="caption">pyramid yarn</div>

            <div class="gallery-item random" onclick="openImage(this)">
                <img src="tfren11.jpg">
                <div class="caption">artwalk</div>
            </div>

            </div>



        </div>

    </div>

    <!-- MODAL -->
    <div id="imgModal" class="img-modal">

        <span class="close" onclick="closeImage()">
            &times;
        </span>

        <img id="modalImg">

        <div id="modalCaption"></div>

    </div>

    <!-- SCRIPT -->
    <script>

        /* OPEN IMAGE */
        function openImage(el) {

            const modal =
                document.getElementById("imgModal");

            const modalImg =
                document.getElementById("modalImg");

            const caption =
                el.querySelector(".caption");

            modalImg.src =
                el.querySelector("img").src;

            document.getElementById("modalCaption").innerText =
                caption ? caption.innerText : "";

            modal.style.display = "flex";
        }

        /* CLOSE */
        function closeImage() {

            document.getElementById("imgModal").style.display =
                "none";
        }

        /* OUTSIDE CLICK */
        window.onclick = function (e) {

            const modal =
                document.getElementById("imgModal");

            if (e.target === modal) {

                modal.style.display = "none";
            }
        }

        /* --- ALBUM FILTER ----------------------------------------------------------------------------------------- */

        const tabs =
            document.querySelectorAll(".tab");

        const items =
            document.querySelectorAll(".gallery-item");

        /* CLICK TAB */
        tabs.forEach(tab => {

            tab.addEventListener("click", () => {

                /* REMOVE ACTIVE */
                tabs.forEach(btn =>
                    btn.classList.remove("active")
                );

                /* ACTIVE */
                tab.classList.add("active");

                const text =
                    tab.innerText.toLowerCase();

                /* SHOW ALL */
                if (text === "all") {

                    items.forEach(item => {

                        item.style.display = "block";
                    });

                    return;
                }

                /* FILTER */
                items.forEach(item => {

                    item.style.display = "none";

                    if (
                        text === "group photos" &&
                        item.classList.contains("group")
                    ) {
                        item.style.display = "block";
                    }

                    if (
                        text === "duos" &&
                        item.classList.contains("duo")
                    ) {
                        item.style.display = "block";
                    }

                    if (
                        text === "me" &&
                        item.classList.contains("me")
                    ) {
                        item.style.display = "block";
                    }

                    if (
                        text === "school dump" &&
                        item.classList.contains("school")
                    ) {
                        item.style.display = "block";
                    }

                    if (
                        text === "randoms" &&
                        item.classList.contains("random")
                    ) {
                        item.style.display = "block";
                    }

                });

            });

        });

    </script>
</body>
